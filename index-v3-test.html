<!-- =========================
AÑADE ESTO JUSTO DEBAJO DE:
<div class="container">
========================= -->

<div class="topbar">

  <button
    class="menu-btn"
    onclick="toggleSidebar()"
  >

    <span></span>
    <span></span>
    <span></span>

  </button>

  <div class="topbar-right">

    <button
      class="time-filter active"
    >
      7D
    </button>

    <button class="time-filter">
      30D
    </button>

    <button class="time-filter">
      3M
    </button>

    <button
      class="store-switcher"
      onclick="toggleStoreMenu()"
    >

      <span id="currentStore">
        ZentarioShop
      </span>

    </button>

  </div>

</div>

<!-- =========================
STORE MENU
========================= -->

<div
  class="store-menu"
  id="storeMenu"
>

  <div id="storeList"></div>

  <button
    class="new-store-btn"
    onclick="openStoreModal()"
  >
    Nueva tienda
  </button>

</div>

<!-- =========================
SIDEBAR
========================= -->

<div
  class="sidebar-overlay"
  id="sidebarOverlay"
  onclick="closeSidebar()"
></div>

<div
  class="sidebar"
  id="sidebar"
>

  <div class="sidebar-header">

    <div class="sidebar-logo">
      Z
    </div>

    <div>

      <div class="sidebar-title">
        Zentario
      </div>

      <div class="sidebar-subtitle">
        Profit System
      </div>

    </div>

  </div>

  <div class="sidebar-nav">

    <button
      class="sidebar-link active"
      onclick="showPage('calculatorPage',this)"
    >
      Calculadora
    </button>

    <button
      class="sidebar-link"
      onclick="showPage('historyPage',this)"
    >
      Histórico
    </button>

    <button
      class="sidebar-link"
      onclick="showPage('statsPage',this)"
    >
      Estadísticas
    </button>

    <button
      class="sidebar-link"
      onclick="showPage('calendarPage',this)"
    >
      Calendario
    </button>

  </div>

</div>

<!-- =========================
PAGES WRAPPER
========================= -->

<div
  class="page active"
  id="calculatorPage"
>

<!-- TU APP ACTUAL DE LA V1 VA AQUÍ -->

</div>

<!-- =========================
HISTORY PAGE
========================= -->

<div
  class="page"
  id="historyPage"
>

  <div class="glass-card">

    <div class="section-title">
      Histórico
    </div>

    <div
      class="history-list"
      id="historyList"
    ></div>

  </div>

</div>

<!-- =========================
STATS PAGE
========================= -->

<div
  class="page"
  id="statsPage"
>

  <div class="glass-card">

    <div class="section-title">
      Estadísticas
    </div>

    <div class="stats-grid">

      <div class="stats-card">

        <div class="stats-label">
          Facturación Total
        </div>

        <div
          class="stats-value"
          id="statsFacturacion"
        >
          0€
        </div>

      </div>

      <div class="stats-card">

        <div class="stats-label">
          Beneficio Total
        </div>

        <div
          class="stats-value"
          id="statsBeneficio"
        >
          0€
        </div>

      </div>

      <div class="stats-card">

        <div class="stats-label">
          Margen Medio
        </div>

        <div
          class="stats-value"
          id="statsMargen"
        >
          0%
        </div>

      </div>

      <div class="stats-card">

        <div class="stats-label">
          Productos
        </div>

        <div
          class="stats-value"
          id="statsProductos"
        >
          0
        </div>

      </div>

    </div>

  </div>

</div>

<!-- =========================
CALENDAR PAGE
========================= -->

<div
  class="page"
  id="calendarPage"
>

  <div class="glass-card">

    <div class="section-title">
      Calendario
    </div>

    <div class="calendar-placeholder">

      Próximamente:
      histórico visual premium

    </div>

  </div>

</div>

<!-- =========================
STORE MODAL
========================= -->

<div
  class="modal-overlay"
  id="storeModal"
>

  <div class="modal-box">

    <div class="modal-title">
      Nueva tienda
    </div>

    <input
      type="text"
      id="storeInput"
      placeholder="Nombre de la tienda"
    >

    <div class="modal-buttons">

      <button
        class="modal-cancel"
        onclick="closeStoreModal()"
      >
        Cancelar
      </button>

      <button
        class="modal-create"
        onclick="createStore()"
      >
        Crear
      </button>

    </div>

  </div>

</div>
